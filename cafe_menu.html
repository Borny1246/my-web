<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="UTF-8">
    <meta name="viewport" content="width=device-width, initial scale=1.0" />
    <link rel="stylesheet" href="forms.css">
    <title>Cafe Price List</title>
</head>

<body>

    <form action="" id="personal_det">

        <div class="name">
            <label for="FirstName"><b>First Name:</b></label><br>
            <input type="text" id="FirstName"><br>

            <label for="SName"><b>Second Name:</b></label><br>
            <input type="text" id="SName"><br><br>

            <label for="Email"><b>Enter your email:</b></label><br>
            <input type="text" id="Email">
        </div>

        <div class="about">
            <label for="Age"><b>Enter your age:</b></label><br>
            <input type="text" id="Age">
        </div>

        <div class="qualification">
            <label for="Quali"><b>What are your qualifications:</b><br>
                <i>(You can provide as many and explain as much as you can)</i>
            </label><br>
            <textarea id="Quali" rows="10" cols="80"></textarea>
        </div>

        <input class="submission" type="submit">

    </form>

    <div id="output"></div>

    <script src="formms.js"></script>

</body>

</html>
